server:
  port: 8083 # Hoặc port tùy chọn của bạn

spring:
  application:
    name: booking-service
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://ep-hidden-bar-azmsarvo-pooler.c-3.ap-southeast-1.aws.neon.tech/booking_db?sslmode=require&channel_binding=require
    username: neondb_owner
    password: npg_4NeM5xPfaAsY
  task:
    execution:
      shutdown:
        await-termination: true
        await-termination-period: 15s
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 15s
    lifecycle:
      timeout-per-shutdown-phase: 20s
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}

core:
  service:
    url: ${CORE_SERVICE_URL:http://localhost:8082}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

openapi:
  service:
    title: Booking Service API
    version: 1.0.0

logging:
  level:
    root: INFO
    web: INFO

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html